<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClickCoins</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            width: 85%;
            max-width: 400px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: #00d2ff; }

        #score {
            font-size: 3rem;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 20px #00d2ff;
        }

        #click-button {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            transition: transform 0.05s;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #click-button:active {
            transform: scale(0.92);
        }

        .shop {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-btn {
            background: #2c3e50;
            color: #bdc3c7;
            border: 1px solid #34495e;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #1a252f;
        }

        .stats { margin-top: 15px; font-size: 0.8rem; color: #aaa; }
        
        .reset-link {
            margin-top: 20px;
            display: block;
            color: #555;
            font-size: 0.7rem;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>ClickCoins</h1>
        <div id="score">0</div>
        
        <button id="click-button">КЛИК!</button>

        <div class="stats">
            Сила: <span id="click-power">1</span> | 
            Авто: <span id="auto-income">0</span>/сек
        </div>

        <div class="shop">
            <button id="buy-click" class="upgrade-btn">Улучшить клик (10)</button>
            <button id="buy-auto" class="upgrade-btn">Нанять робота (50)</button>
        </div>
        
        <span class="reset-link" onclick="resetGame()">сбросить всё</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ЗАГРУЗКА ДАННЫХ ---
        let score = parseFloat(localStorage.getItem('cc_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('cc_pwr')) || 1;
        let autoIncome = parseInt(localStorage.getItem('cc_auto')) || 0;
        let costPwr = parseInt(localStorage.getItem('cc_costPwr')) || 10;
        let costAuto = parseInt(localStorage.getItem('cc_costAuto')) || 50;

        const scoreEl = document.getElementById('score');
        const pwrEl = document.getElementById('click-power');
        const autoEl = document.getElementById('auto-income');
        const btnPwr = document.getElementById('buy-click');
        const btnAuto = document.getElementById('buy-auto');

        // --- ФУНКЦИИ ---
        function saveGame() {
            localStorage.setItem('cc_score', score);
            localStorage.setItem('cc_pwr', clickPower);
            localStorage.setItem('cc_auto', autoIncome);
            localStorage.setItem('cc_costPwr', costPwr);
            localStorage.setItem('cc_costAuto', costAuto);
        }

        function updateUI() {
            scoreEl.textContent = Math.floor(score);
            pwrEl.textContent = clickPower;
            autoEl.textContent = autoIncome;
            
            btnPwr.textContent = `Улучшить клик (${costPwr})`;
            btnAuto.textContent = `Нанять робота (${costAuto})`;
            
            btnPwr.disabled = score < costPwr;
            btnAuto.disabled = score < costAuto;
        }

        function resetGame() {
            if(confirm("Весь прогресс ClickCoins будет удален. Продолжить?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- СОБЫТИЯ ---
        document.getElementById('click-button').addEventListener('click', () => {
            score += clickPower;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
        });

        btnPwr.addEventListener('click', () => {
            if (score >= costPwr) {
                score -= costPwr;
                clickPower += 1;
                costPwr = Math.round(costPwr * 1.6);
                saveGame();
                updateUI();
            }
        });

        btnAuto.addEventListener('click', () => {
            if (score >= costAuto) {
                score -= costAuto;
                autoIncome += 1;
                costAuto = Math.round(costAuto * 2);
                saveGame();
                updateUI();
            }
        });

        // Авто-доход и авто-сохранение
        setInterval(() => {
            if (autoIncome > 0) {
                score += autoIncome;
                updateUI();
            }
        }, 1000);

        setInterval(saveGame, 5000); // Сохраняем в память каждые 5 сек

        // Запуск интерфейса
        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClickCoins</title>
    <!-- Подключаем скрипт Telegram для интеграции -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --main-purple: #8a2be2;
            --dark-purple: #4b0082;
            --bg-color: #0f051d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, #1e0a3d 0%, #0f051d 100%);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Чтобы не было лишней прокрутки на телефоне */
            touch-action: manipulation; /* Убирает задержку клика на мобилках */
        }

        .header {
            margin-top: 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 24px; color: #d8b4fe; }

        #score-container {
            font-size: 48px;
            font-weight: 800;
            margin: 20px 0;
            color: white;
            text-shadow: 0 0 15px var(--main-purple);
        }

        /* Главная монета */
        .coin-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #coin {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, var(--main-purple), var(--dark-purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border: 8px solid #a855f7;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
            cursor: pointer;
            transition: transform 0.05s ease-in-out;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #coin:active {
            transform: scale(0.92);
        }

        /* Нижнее меню (Магазин) */
        .bottom-menu {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .upgrade-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .btn-upgrade {
            background: var(--main-purple);
            border: none;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            font-weight: bold;
            width: 48%;
            font-size: 13px;
        }

        .btn-upgrade:disabled {
            background: #444;
            opacity: 0.5;
        }

        .stats {
            text-align: center;
            font-size: 14px;
            color: #a78bfa;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ClickCoins</h1>
    </div>

    <div id="score-container">0</div>

    <div class="coin-container">
        <div id="coin">💎</div>
    </div>

    <div class="bottom-menu">
        <div class="stats">
            Клик: +<span id="pwr">1</span> | Авто: +<span id="auto">0</span>/с
        </div>
        <div class="upgrade-row">
            <button id="buy-click" class="btn-upgrade">Сила (15 🪙)</button>
            <button id="buy-auto" class="btn-upgrade">Робот (100 🪙)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачивает окно в Telegram на весь экран

        let score = 0;
        let pwr = 1;
        let auto = 0;

        let costPwr = 15;
        let costAuto = 100;

        const scoreEl = document.getElementById('score-container');
        const coin = document.getElementById('coin');

        function update() {
            scoreEl.textContent = Math.floor(score);
            document.getElementById('pwr').textContent = pwr;
            document.getElementById('auto').textContent = auto;
            
            document.getElementById('buy-click').textContent = `Клик (${costPwr})`;
            document.getElementById('buy-auto').textContent = `Робот (${costAuto})`;
            
            document.getElementById('buy-click').disabled = score < costPwr;
            document.getElementById('buy-auto').disabled = score < costAuto;
        }

        coin.addEventListener('pointerdown', (e) => {
            score += pwr;
            // Вибрация для мобилок (если поддерживает Telegram)
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            update();
        });

        document.getElementById('buy-click').addEventListener('click', () => {
            if (score >= costPwr) {
                score -= costPwr;
                pwr++;
                costPwr = Math.round(costPwr * 1.6);
                update();
            }
        });

        document.getElementById('buy-auto').addEventListener('click', () => {
            if (score >= costAuto) {
                score -= costAuto;
                auto += 1;
                costAuto = Math.round(costAuto * 2);
                update();
            }
        });

        setInterval(() => {
            if (auto > 0) {
                score += auto;
                update();
            }
        }, 1000);

        update();
    </script>
</body>
</html>
